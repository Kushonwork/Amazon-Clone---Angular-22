<div class="login-page">

    <!-- Logo -->

    <img
        routerLink="/"
        src="https://pngimg.com/uploads/amazon/amazon_PNG21.png"
        class="logo"
        alt="Amazon Logo">

    <!-- Login Card -->

    <mat-card class="login-card">

        <h1>Sign in</h1>

        <form
            [formGroup]="loginForm"
            (ngSubmit)="login()">

            <label>Email or mobile phone number</label>

            <mat-form-field appearance="outline">

                <input
                    matInput
                    formControlName="email">

            </mat-form-field>

            <label>Password</label>

            <mat-form-field appearance="outline">

                <input
                    matInput
                    [type]="hidePassword ? 'password' : 'text'"
                    formControlName="password">

                <button
                    mat-icon-button
                    matSuffix
                    type="button"
                    (click)="togglePassword()">

                    <mat-icon>

                        {{hidePassword ? 'visibility' : 'visibility_off'}}

                    </mat-icon>

                </button>

            </mat-form-field>

            @if(error){

                <p class="error">

                    {{error}}

                </p>

            }

            <button
                class="continue-btn"
                mat-flat-button
                type="submit">

                Continue

            </button>

        </form>

        <p class="terms">

            By continuing, you agree to Amazon's

            <a>Conditions of Use</a>

            and

            <a>Privacy Notice</a>.

        </p>

        <hr>

        <h3>

            New to Amazon?

        </h3>

        <button
            routerLink="/register"
            class="create-btn"
            mat-stroked-button>

            Create your Amazon account

        </button>

    </mat-card>

</div>
